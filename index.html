<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyHabits</title>
    <link rel="icon" type="image/png" sizes="196x196" href="./logo.png" />
    <link rel="stylesheet" href="style.css" />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      h1 {
        font-size: 68px;
        line-height: 1.1;
        margin-bottom: 20px;
        font-weight: 800;
        animation: fadeUp 1.2s ease;
      }

      p {
        color: #cbd5f5;
        margin-bottom: 30px;
        font-size: 16px;
        animation: fadeUp 1.4s ease;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="logo">
          <img src="./logo.png" height="40" width="40" style="margin-right: 10px" />MyHabits
        </div>

        <div class="auth-buttons">
          <a href="./privacy.html" class="sign-in">Policy privacy</a>
          <a href="./terms-service.html" class="sign-in">Terms of service</a>
        </div>
      </header>

      <section class="hero">
        <div class="hero-text">
          <div class="badge">TRANSFORM YOUR DAILY ROUTINE</div>
          <h1>
            Build Better<br />
            <span class="habit-color-name">Habits</span>, One<br />Day at a Time
          </h1>
          <p>
            Track your progress, stay motivated, and achieve your goals with MyHabits — the intuitive habit
            tracker designed for real results.
          </p>
          <a href="www.youtube.com" target="_blank">
            <img src="./google-play.svg" height="100" width="300" class="get-google-play get-started" />
          </a>

          <div class="footer">
            <div class="avatars">
              <div class="avatar a1">A</div>
              <div class="avatar a2">B</div>
              <div class="avatar a3">C</div>
              <div class="avatar a4">D</div>
            </div>

            <div class="rating">
              <div class="stars">★★★★★</div>
              <div class="footer-text">4.9 rating • 5K+ active users</div>
            </div>
          </div>
        </div>

        <div class="phone">
          <div class="notch"></div>
          <img src="./screen.jpeg" height="560" width="280" />
        </div>
      </section>
    </div>
  </body>
</html>
